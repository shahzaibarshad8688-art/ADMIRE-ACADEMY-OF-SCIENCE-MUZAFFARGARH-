<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admire Portal Control - Fixed Smart Mode</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --card-bg: #161b22;
      --border-color: #30363d;
      --text-main: #c9d1d9;
      --accent: #58a6ff;
      --danger: #f85149;
      --success: #2ea44f;
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    h2, h3 { margin-top: 0; color: #fff; }
    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      color: #fff;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background: var(--success);
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab {
      background: var(--bg-dark);
      padding: 8px 12px;
      cursor: pointer;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      flex: 1;
      text-align: center;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); }
    .pane { display: none; }
    .pane.active { display: block; }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-dark);
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .del-btn {
      background: var(--danger);
      width: auto;
      margin: 0;
      padding: 5px 10px;
      color: white;
      border-radius: 4px;
    }
    #statusText { color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 15px; display: none; }
    .preview-list { margin-top: 20px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
  </style>
</head>
<body>

  <div id="authShield" class="container">
    <h2>🔑 Admire Admin Control</h2>
    <input type="password" id="portalPass" placeholder="Enter Secure Master Password...">
    <button onclick="verifyAccess()">Unlock Terminal →</button>
  </div>

  <div id="mainConsole" class="container" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>⚙️ Smart Dashboard</h3>
      <button onclick="lockConsole()" style="width:auto; background:var(--border-color); padding:5px 10px;">Lock</button>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchPane('gallery', this)">🖼️ Gallery Management</div>
      <div class="tab" onclick="switchPane('videos', this)">🎬 Videos</div>
      <div class="tab" onclick="switchPane('notices', this)">📢 Notices</div>
    </div>

    <div id="statusText">⏳ Processing Image Security Matrix... Please wait...</div>

    <div id="pane-gallery" class="pane active">
      <input type="file" id="imgFile" accept="image/*">
      <input type="text" id="imgCaption" placeholder="Image Caption (Optional)...">
      <button onclick="saveGalleryImage()">Save to Gallery Layout</button>
      <h3>📋 Uploaded Images List</h3>
      <div id="galleryList" class="preview-list"></div>
    </div>

    <div id="pane-videos" class="pane">
      <input type="text" id="vidTitle" placeholder="Video Title...">
      <input type="text" id="vidUrl" placeholder="YouTube Video URL...">
      <button onclick="saveVideoLink()">Save Video Link</button>
      <h3>📋 Uploaded Videos List</h3>
      <div id="videoList" class="preview-list"></div>
    </div>

    <div id="pane-notices" class="pane">
      <input type="text" id="noteTitle" placeholder="Notice Heading...">
      <textarea id="noteText" placeholder="Notice Content Description..." rows="4"></textarea>
      <button onclick="saveNoticeBoard()">Publish Announcement</button>
      <h3>📋 Published Announcements</h3>
      <div id="noticeList" class="preview-list"></div>
    </div>
  </div>

<script>
function verifyAccess(){
  const p = document.getElementById('portalPass').value;
  if(p === 'admire1234') {
    document.getElementById('authShield').style.display = 'none';
    document.getElementById('mainConsole').style.display = 'block';
    renderDashboardLists();
  } else {
    alert('Security Alert: Access Denied.');
  }
}

function lockConsole(){
  document.getElementById('portalPass').value = '';
  document.getElementById('authShield').style.display = 'block';
  document.getElementById('mainConsole').style.display = 'none';
}

function switchPane(id, tabEl){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  tabEl.classList.add('active');
}

function getStorage(k){ return JSON.parse(localStorage.getItem('aa_'+k)) || []; }
function setStorage(k, v){ localStorage.setItem('aa_'+k, JSON.stringify(v)); renderDashboardLists(); }

function saveGalleryImage(){
  const fileInput = document.getElementById('imgFile');
  const captionInput = document.getElementById('imgCaption');
  const file = fileInput.files[0];
  const caption = captionInput.value.trim();
  const status = document.getElementById('statusText');
  
  if(!file){ alert('Select an image file first.'); return; }
  
  status.style.display = "block";
  
  const reader = new FileReader();
  reader.onload = function(event){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      
      const max_size = 1000; 
      if (width > height) {
        if (width > max_size) { height *= max_size / width; width = max_size; }
      } else {
        if (height > max_size) { width *= max_size / height; height = max_size; }
      }
      
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.5);
      
      try {
        const d = getStorage('gallery');
        d.unshift({ id: Date.now(), src: compressedDataUrl, caption: caption || 'Gallery Image Asset' });
        setStorage('gallery', d);
        fileInput.value = '';
        captionInput.value = '';
        status.style.display = "none";
        alert('Success: Image optimized and deployed to website perfectly!');
      } catch(err) {
        status.style.display = "none";
        alert('Storage full. Please wipe some old assets first.');
      }
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

function saveVideoLink(){
  const t = document.getElementById('vidTitle').value.trim();
  const u = document.getElementById('vidUrl').value.trim();
  if(!t || !u){ alert('Fill out title and link parameters.'); return; }
  const d = getStorage('videos');
  d.unshift({ id: Date.now(), title: t, url: u });
  setStorage('videos', d);
  document.getElementById('vidTitle').value = '';
  document.getElementById('vidUrl').value = '';
  alert('Success: Video stream deployed!');
}

function saveNoticeBoard(){
  const t = document.getElementById('noteTitle').value.trim();
  const txt = document.getElementById('noteText').value.trim();
  if(!t || !txt){ alert('Enter notice content completely.'); return; }
  const d = getStorage('notices');
  d.unshift({ id: Date.now(), title: t, text: txt, date: new Date().toLocaleDateString() });
  setStorage('notices', d);
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteText').value = '';
  alert('Success: Announcement published!');
}

function deleteItem(type, id){
  if(!confirm('Confirm deletion?')) return;
  const d = getStorage(type).filter(item => item.id !== id);
  setStorage(type, d);
}

function renderDashboardLists(){
  const gl = document.getElementById('galleryList');
  const vl = document.getElementById('videoList');
  const nl = document.getElementById('noticeList');
  
  if(gl) gl.innerHTML = getStorage('gallery').map(i => `<div class="item-row"><span>🖼️ ${i.caption}</span><button class="del-btn" onclick="deleteItem('gallery', ${i.id})">Wipe</button></div>`).join('');
  if(vl) vl.innerHTML = getStorage('videos').map(v => `<div class="item-row"><span>🎬 ${v.title}</span><button class="del-btn" onclick="deleteItem('videos', ${v.id})">Wipe</button></div>`).join('');
  if(nl) nl.innerHTML = getStorage('notices').map(n => `<div class="item-row"><span>📢 [${n.date}] ${n.title}</span><button class="del-btn" onclick="deleteItem('notices', ${n.id})">Wipe</button></div>`).join('');
}
</script>
</body>
</html>
